version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tienda_sqlserver
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Tienda123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - tienda_net
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Tienda123!", "-No", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: tienda_backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - tienda_net

  frontend:
    build: ./frontend
    container_name: tienda_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
      - ALLOWED_HOSTS=all
      - REACT_APP_GOOGLE_MAPS_API_KEY=AIzaSyAAu1Cnaa1ySE_UnvUv14vl7V1D_SSIzHA
    depends_on:
      - backend
    networks:
      - tienda_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tienda_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=TU_TOKEN_AQUI
    depends_on:
      - frontend
    networks:
      - tienda_net

volumes:
  sqlserver_data:

networks:
  tienda_net:
    driver: bridge